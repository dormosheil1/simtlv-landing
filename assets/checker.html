<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדוק תאימות eSIM — SimTLV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  font-family:'Heebo',Arial,sans-serif;
  background:#F5F5F7;
  color:#1d1d1f;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* ─── WIDGET ─────────────────────────────────────── */
.widget{max-width:860px;margin:0 auto;padding:44px 20px 72px}

/* ─── HEADER ─────────────────────────────────────── */
.hdr{text-align:center;margin-bottom:36px}
.hdr-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:1px solid #e0e0e0;border-radius:99px;
  font-size:12px;font-weight:600;color:#555;
  padding:5px 14px;margin-bottom:16px;letter-spacing:.3px;
}
.hdr-tag svg{width:14px;height:14px;color:#7c3aed}
.hdr-h1{
  font-size:clamp(26px,5vw,46px);font-weight:900;
  color:#1d1d1f;line-height:1.1;letter-spacing:-1px;margin-bottom:10px;
}
.hdr-h1 em{
  font-style:normal;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-p{font-size:16px;color:#6e6e73;font-weight:400}

/* ─── STATS ──────────────────────────────────────── */
.stats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.stat{
  display:flex;align-items:center;gap:6px;
  background:#fff;border:1px solid #e5e5ea;
  border-radius:10px;padding:8px 16px;
  font-size:13px;font-weight:600;color:#555;
}
.stat b{font-size:15px;font-weight:800;color:#7c3aed}

/* ─── SEARCH ─────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg.si{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;color:#aaa;pointer-events:none;
}
.search{
  width:100%;padding:14px 48px 14px 46px;
  font-size:15.5px;font-family:'Heebo',Arial,sans-serif;font-weight:400;
  color:#1d1d1f;background:#fff;
  border:1px solid #d5d5d5;border-radius:14px;outline:none;
  transition:border-color .18s,box-shadow .18s;
}
.search::placeholder{color:#b0b0b0}
.search:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.search-x{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;background:#f0f0f0;
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  color:#666;font-size:14px;transition:background .15s;
}
.search-x:hover{background:#e0e0e0}
.search-x.on{display:flex}

/* ─── BRAND TABS ─────────────────────────────────── */
.brands{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.brand-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:10px;
  border:1px solid #e0e0e0;background:#fff;
  cursor:pointer;font-family:'Heebo',Arial,sans-serif;
  font-size:13px;font-weight:600;color:#444;
  transition:all .15s;user-select:none;
}
.brand-btn img{width:18px;height:18px;object-fit:contain;display:block;flex-shrink:0}
.brand-btn:hover{border-color:#bbb;color:#1d1d1f;background:#fafafa}
.brand-btn.active{
  background:#1d1d1f;border-color:#1d1d1f;color:#fff;
}
.brand-btn.active img{filter:invert(1) brightness(10)}
.brand-btn.active svg{fill:#fff}

/* ─── RESULTS INFO ───────────────────────────────── */
.rinfo{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:20px;
}
.rinfo-text{font-size:13px;color:#999;font-weight:500}
.rinfo-text strong{color:#7c3aed}
.rinfo-dots{display:flex;gap:14px}
.rdot{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#aaa}
.dot{width:8px;height:8px;border-radius:50%}
.dot.ok{background:#34c759}.dot.no{background:#ff3b30}

/* ─── GRID ───────────────────────────────────────── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;margin-bottom:24px;
}
@media(max-width:620px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:400px){.grid{grid-template-columns:1fr}}

/* ─── CARD ───────────────────────────────────────── */
.card{
  background:#fff;border:1px solid #e5e5ea;border-radius:14px;
  padding:14px 16px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;bottom:0;right:0;width:3px;
  border-radius:0 14px 14px 0;
}
.card.ok::after{background:#34c759}
.card.no::after{background:#ff3b30}
.card:hover{border-color:#ccc;box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}

.brand-logo{
  width:38px;height:38px;border-radius:10px;background:#f5f5f7;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  overflow:hidden;
}
.brand-logo img{width:22px;height:22px;object-fit:contain}

.card-info{flex:1;min-width:0}
.card-model{font-size:13.5px;font-weight:700;color:#1d1d1f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;margin-bottom:2px}
.card-brand{font-size:11.5px;color:#aaa;font-weight:500}

.card-badge{
  flex-shrink:0;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:99px;white-space:nowrap;
}
.card-badge.ok{background:#e8faf0;color:#1a7a3c}
.card-badge.no{background:#ffeaea;color:#c0392b}

/* ─── EMPTY ──────────────────────────────────────── */
.empty{
  grid-column:1/-1;text-align:center;padding:56px 20px;
}
.empty-icon{font-size:40px;margin-bottom:12px;display:block}
.empty-t{font-size:17px;font-weight:700;color:#555;margin-bottom:5px}
.empty-s{font-size:13px;color:#aaa}

/* ─── NOT SURE BOX ───────────────────────────────── */
.nsure{
  background:#fff;border:1.5px dashed #e0e0e0;border-radius:14px;
  padding:20px;text-align:center;
}
.nsure-t{font-size:14px;font-weight:700;color:#1d1d1f;margin-bottom:5px}
.nsure-s{font-size:13px;color:#999;margin-bottom:14px}
.nsure-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px}
.chip{
  padding:7px 16px;border-radius:99px;border:1px solid #e0e0e0;
  background:#fff;font-size:13px;font-weight:600;color:#444;
  cursor:pointer;font-family:'Heebo',Arial,sans-serif;
  transition:all .14s;
}
.chip:hover{background:#f0ecff;border-color:#c4b5fd;color:#7c3aed}

/* ─── SUPPORT BUTTON ─────────────────────────────── */
.support-btn{
  display:inline-flex;align-items:center;gap:9px;
  padding:11px 22px;border-radius:12px;
  background:#fff;border:1.5px solid #25D366;
  color:#128a2e;font-family:'Heebo',Arial,sans-serif;
  font-size:14px;font-weight:700;text-decoration:none;
  cursor:pointer;transition:all .15s;margin-top:16px;
}
.support-btn:hover{background:#25D366;color:#fff;border-color:#25D366}
.support-btn img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.support-btn:hover img{filter:brightness(10)}

/* ─── OVERLAY ────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:1000;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:580px){.overlay{align-items:center}}

/* ─── MODAL ──────────────────────────────────────── */
.modal{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
  overscroll-behavior:contain;scrollbar-width:none;
  transform:translateY(48px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.modal::-webkit-scrollbar{display:none}
.overlay.open .modal{transform:none}
@media(min-width:580px){.modal{border-radius:22px;max-height:88vh}}

.modal-handle{display:flex;justify-content:center;padding:12px 0 0}
.modal-bar{width:36px;height:4px;background:#e5e5ea;border-radius:99px}
@media(min-width:580px){.modal-handle{display:none}}

.modal-close{
  position:absolute;top:14px;left:14px;
  width:30px;height:30px;border-radius:50%;
  background:#f0f0f0;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#555;font-size:15px;font-weight:400;
  transition:background .14s,transform .14s;z-index:5;line-height:1;
}
.modal-close:hover{background:#e0e0e0;transform:rotate(90deg)}

.modal-body{padding:0 24px 28px;direction:rtl}

/* Modal: hero */
.m-hero{text-align:center;padding:18px 0 22px;border-bottom:1px solid #f0f0f0;margin-bottom:22px}
.m-brand-logo{
  width:64px;height:64px;border-radius:18px;
  background:#f5f5f7;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}
.m-brand-logo img{width:36px;height:36px;object-fit:contain}
.m-status-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:700;padding:6px 16px;border-radius:99px;
  margin-bottom:10px;
}
.m-status-badge.ok{background:#e8faf0;color:#1a7a3c}
.m-status-badge.no{background:#ffeaea;color:#c0392b}
.m-model{font-size:22px;font-weight:800;color:#1d1d1f;line-height:1.2;margin-bottom:4px}
.m-meta{font-size:13px;color:#aaa;font-weight:500}

/* Modal: no-esim warning */
.m-no{
  background:#fff8f8;border:1px solid #ffd5d5;border-radius:12px;
  padding:16px;margin-bottom:20px;
}
.m-no-t{font-size:13.5px;font-weight:700;color:#c0392b;margin-bottom:6px}
.m-no-s{font-size:13px;color:#666;line-height:1.55}

/* Modal: section label */
.slbl{
  font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px;
  display:flex;align-items:center;gap:7px;
}
.slbl::before{content:'';width:3px;height:14px;background:#7c3aed;border-radius:2px}

/* Modal: steps */
.steps{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.step{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;background:#fafafa;
  border:1px solid #f0f0f0;border-radius:12px;
}
.step-n{
  width:26px;height:26px;border-radius:50%;
  background:#7c3aed;color:#fff;
  font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-t{font-size:13.5px;color:#444;font-weight:500;line-height:1.55;padding-top:3px}
.step-t strong{color:#1d1d1f;font-weight:700}
.path{
  display:inline-flex;
  background:#f0ecff;color:#7c3aed;
  font-size:11.5px;font-weight:700;
  padding:2px 8px;border-radius:6px;margin:0 2px;
}
.tick{
  display:inline-flex;align-items:center;gap:3px;
  background:#e8faf0;color:#1a7a3c;
  font-size:11.5px;font-weight:700;
  padding:3px 8px;border-radius:6px;margin-top:4px;
}

/* Modal: alt check */
.alt{
  background:#fffbef;border:1px solid #fde68a;
  border-radius:12px;padding:14px;margin-bottom:18px;
}
.alt-t{font-size:12.5px;font-weight:700;color:#92400e;margin-bottom:6px}
.alt-s{font-size:13px;color:#78350f;line-height:1.55}
.alt-s .path{background:#fef3c7;color:#92400e}

/* Modal: CTA */
.m-cta{
  background:#1d1d1f;border-radius:16px;
  padding:20px 18px;text-align:center;
}
.m-cta-s{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:12px;font-weight:500}
.m-cta-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;color:#1d1d1f;
  font-family:'Heebo',Arial,sans-serif;
  font-size:15px;font-weight:800;
  padding:12px 26px;border-radius:12px;
  text-decoration:none;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.m-cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.18)}
</style>
</head>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function buildSteps(b){
  const ins=INS[b]||INS.generic;
  const stHtml=ins.steps.map((s,i)=>`
    <div class="step">
      <div class="step-n">${i+1}</div>
      <div class="step-t">${s}</div>
    </div>`).join('');
  const altHtml=ins.alt?`
    <div class="alt">
      <div class="alt-t">${ins.alt.t}</div>
      <div class="alt-s">${ins.alt.s}</div>
    </div>`:'';
  return`<div class="slbl">${ins.title}</div>
    <div class="steps">${stHtml}</div>${altHtml}`;
}

/* ─── STATE ──────────────────────────────────────── */
let brand='all', query='';

function render(){
  const q=query.toLowerCase().trim();
  const list=D.filter(d=>
    (brand==='all'||d.b===brand)&&(!q||d.m.toLowerCase().includes(q)||d.b.toLowerCase().includes(q))
  ).sort((a,b)=>(b.y-a.y)||(b.e-a.e));

  const ok=list.filter(d=>d.e).length;
  const ri=document.getElementById('rinfo');
  ri.innerHTML=list.length
    ?`נמצאו <strong>${list.length}</strong> מכשירים · <strong style="color:#1a7a3c">${ok} תומכים</strong> · <strong style="color:#c0392b">${list.length-ok} לא תומכים</strong>`
    :'';

  const g=document.getElementById('grid');
  if(!list.length){
    g.innerHTML=`<div class="empty"><span class="empty-icon">🔍</span><div class="empty-t">לא נמצאו תוצאות</div><div class="empty-s">נסה שם אחר, או בחר "הכל"</div></div>`;
    return;
  }
  g.innerHTML=list.map(d=>`
    <div class="card ${d.e?'ok':'no'}" data-b="${esc(d.b)}" data-m="${esc(d.m)}">
      <div class="brand-logo">${logo(d.b)}</div>
      <div class="card-info">
        <div class="card-model">${esc(d.m)}</div>
        <div class="card-brand">${esc(d.b)} · ${d.y}</div>
      </div>
      <div class="card-badge ${d.e?'ok':'no'}">${d.e?'✅ תומך':'❌ לא תומך'}</div>
    </div>`).join('');
}

  const dev=D.find(d=>d.b===b&&d.m===m);

  let html=`
    <div class="m-hero">
      <div class="m-brand-logo">${logo(dev.b,36)}</div><br>
      <div class="m-status-badge ${ok?'ok':'no'}">${ok?'✅ המכשיר תומך ב-eSIM':'❌ המכשיר אינו תומך ב-eSIM'}</div>

  document.getElementById('modal').scrollTop=0;
  open();
}

/* ─── EVENTS ─────────────────────────────────────── */
const searchEl=document.getElementById('search');
const searchX=document.getElementById('searchX');
searchEl.addEventListener('input',function(){
  query=this.value;
  searchX.classList.toggle('on',query.length>0);
  render();
});
searchX.addEventListener('click',()=>{
  searchEl.value='';query='';
  searchX.classList.remove('on');
  searchEl.focus();render();
});

document.getElementById('brands').addEventListener('click',e=>{
  const btn=e.target.closest('.brand-btn');
  if(!btn)return;
  brand=btn.dataset.brand;
  document.querySelectorAll('.brand-btn').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('grid').addEventListener('click',e=>{
  const card=e.target.closest('.card');
  if(card)showDevice(card.dataset.b,card.dataset.m);
});

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',function(){
    if(this.dataset.generic){showGeneric();return}
    if(this.dataset.fb){
      brand=this.dataset.fb;
      const tab=document.querySelector(`.brand-btn[data-brand="${brand}"]`);
      document.querySelectorAll('.brand-btn').forEach(t=>t.classList.remove('active'));
      if(tab)tab.classList.add('active');
      render();
    }
  });
});

document.getElementById('mclose').addEventListener('click',close);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))close()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});

// Set support button href
var sb=document.getElementById('js-support-btn');
if(sb) sb.href=SUPPORT_URL;

render();
</script>
</body>
</html>
